<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การเจริญเติบโต - ระบบจัดการฟาร์มกุ้ง</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-shrimp"></i>
                <span>SHRIMP FARM</span>
            </div>
            <ul class="nav-links">
                <li><a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> แดชบอร์ด</a></li>
                <li><a href="pond.html" class="nav-item"><i class="fas fa-water"></i> จัดการบ่อ</a></li>
                <li><a href="water.html" class="nav-item"><i class="fas fa-tint"></i> คุณภาพน้ำ</a></li>
                <li><a href="feeding.html" class="nav-item"><i class="fas fa-utensils"></i> ให้อาหาร</a></li>
                <li><a href="growth.html" class="nav-item active"><i class="fas fa-chart-line"></i> การเจริญเติบโต</a></li>
            </ul>
            <div class="user-info" onclick="logout()" style="cursor: pointer;">
                <span id="display-username">Admin</span> <i class="fas fa-sign-out-alt"></i>
            </div>
        </div>
    </nav>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <div>
                <h1 class="page-title" style="margin-bottom: 5px;">ติดตามการเจริญเติบโต</h1>
                <p style="color: #666;">บันทึกและวิเคราะห์น้ำหนักเฉลี่ยรายวัน</p>
            </div>
            <button class="btn-primary" onclick="toggleGrowthForm()">+ บันทึกการสุ่มวัด</button>
        </div>

        <div id="growth-form" class="card" style="display: none; margin-bottom: 25px; border-top: 4px solid #3498db;">
            
            <form id="main-growth-form" onsubmit="saveGrowth(event)" class="form-row">
                <div class="form-group">
                    <label>เลือกบ่อเลี้ยง</label>
                    <select id="g_pond_id" class="custom-select" required>
                        <option value="">กำลังโหลด...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>น้ำหนัก (กรัม)</label>
                    <input type="number" step="0.01" id="avg_weight" class="custom-input" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>ความยาว (ซม.)</label>
                    <input type="number" step="0.1" id="avg_length" class="custom-input" placeholder="0.0" required>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn-save">
                        <i class="fas fa-save"></i> บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>

        <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
            <div class="card" style="padding: 0; overflow: hidden;">
                <div style="padding: 1.5rem; border-bottom: 1px solid #eee;">
                    <h3 style="margin: 0;">ประวัติการสุ่ม</h3>
                </div>
                <div style="max-height: 400px; overflow-y: auto;">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead style="background: #f8f9fa; position: sticky; top: 0;">
                            <tr>
                                <th style="padding: 12px; text-align: left;">วันที่</th>
                                <th style="padding: 12px; text-align: left;">บ่อ</th>
                                <th style="padding: 12px; text-align: right;">น้ำหนัก</th>
                            </tr>
                        </thead>
                        <tbody id="growth-table-body">
                            <tr><td colspan="3" style="text-align:center; padding:20px;">กำลังโหลด...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h3>แนวโน้มการเติบโต</h3>
                <div style="height: 350px; margin-top: 15px;">
                    <canvas id="growthChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let growthChart;

        function toggleGrowthForm() {
            const form = document.getElementById('growth-form');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        // โหลดบ่อจาก DB มาใส่ Select
        async function loadPonds() {
            try {
                const res = await fetch(`${API_BASE}/ponds`);
                const ponds = await res.json();
                const select = document.getElementById('g_pond_id');
                select.innerHTML = '<option value="">-- เลือกบ่อ --</option>' + 
                    ponds.map(p => `<option value="${p.pond_id}">${p.pond_name}</option>`).join('');
            } catch (err) { console.error(err); }
        }

        async function saveGrowth(e) {
            e.preventDefault();
            const data = {
                pond_id: document.getElementById('g_pond_id').value,
                avg_weight: document.getElementById('avg_weight').value,
                avg_length: document.getElementById('avg_length').value,
                check_date: new Date().toISOString().split('T')[0]
            };

            try {
                const res = await fetch(`${API_BASE}/growth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    Swal.fire('สำเร็จ', 'บันทึกเรียบร้อย', 'success').then(() => location.reload());
                } else {
                    const error = await res.json();
                    Swal.fire('Error 500', error.error, 'error');
                }
            } catch (err) { Swal.fire('ล้มเหลว', 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้', 'error'); }
        }

        async function loadGrowthData() {
            try {
                const res = await fetch(`${API_BASE}/growth`);
                const data = await res.json();
                const tbody = document.getElementById('growth-table-body');
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px;">ไม่มีข้อมูล</td></tr>';
                    return;
                }

                tbody.innerHTML = data.slice(0, 10).map(item => `
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 12px;">${new Date(item.recorded_at || item.check_date).toLocaleDateString('th-TH')}</td>
                        <td style="padding: 12px;">บ่อ ${item.pond_id}</td>
                        <td style="padding: 12px; text-align: right; font-weight: bold; color: #2980b9;">${item.avg_weight} ก.</td>
                    </tr>
                `).join('');
                renderChart(data);
            } catch (err) { console.error(err); }
        }

        function renderChart(data) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            const sortedData = [...data].reverse();
            if (growthChart) growthChart.destroy();
            growthChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sortedData.map(d => new Date(d.recorded_at || d.check_date).toLocaleDateString('th-TH')),
                    datasets: [{
                        label: 'น้ำหนัก (กรัม)',
                        data: sortedData.map(d => d.avg_weight),
                        borderColor: '#3498db',
                        backgroundColor: 'rgba(52, 152, 219, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        loadPonds();
        loadGrowthData();
        document.getElementById('display-username').innerText = localStorage.getItem('currentUser') || 'Admin';

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
