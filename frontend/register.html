<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - ระบบจัดการฟาร์มกุ้ง</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body class="login-page">

    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-user-plus fa-3x"></i>
            <h2>สมัครสมาชิก</h2>
            <p style="color: #666; margin-top: 5px;">สร้างบัญชีเพื่อเข้าใช้งานระบบ</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label>ชื่อผู้ใช้งาน</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="reg_username" placeholder="ระบุชื่อผู้ใช้งาน" required>
                </div>
            </div>
            <div class="form-group">
                <label>รหัสผ่าน</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="reg_password" placeholder="ระบุรหัสผ่าน" required>
                </div>
            </div>
            <div class="form-group">
                <label>ยืนยันรหัสผ่านอีกครั้ง</label>
                <div class="input-icon">
                    <i class="fas fa-check-double"></i>
                    <input type="password" id="confirm_password" placeholder="ยืนยันรหัสผ่าน" required>
                </div>
            </div>
            <button type="submit" class="btn-register">สร้างบัญชีผู้ใช้</button>
        </form>
        
        <div class="login-footer">
            มีบัญชีอยู่แล้ว? <a href="index.html">เข้าสู่ระบบ</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('reg_username').value;
            const password = document.getElementById('reg_password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (password !== confirm) {
                Swal.fire('รหัสผ่านไม่ตรงกัน', 'กรุณาตรวจสอบรหัสผ่านอีกครั้ง', 'error');
                return;
            }

            try {
                const response = await fetch('http://localhost:5000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    Swal.fire({
                        title: 'สมัครสมาชิกสำเร็จ!',
                        text: 'ระบบกำลังพาคุณไปหน้าเข้าสู่ระบบ',
                        icon: 'success',
                        timer: 2000,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'index.html';
                    });
                } else {
                    Swal.fire('ล้มเหลว', data.message || 'ชื่อผู้ใช้งานนี้อาจมีอยู่ในระบบแล้ว', 'warning');
                }
            } catch (error) {
                console.error('Error:', error);
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ (Port 5000)', 'error');
            }
        });
    </script>
</body>
</html>
